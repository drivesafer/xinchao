<body class="bg-zinc-950 text-white antialiased">
  <main class="min-h-screen flex items-center justify-center px-4 py-8">
    <section class="w-full max-w-md rounded-3xl border border-white/10 bg-white/5 backdrop-blur p-6 sm:p-8 shadow-2xl">
      <div class="space-y-6">
        <div class="space-y-4">
          <h1 class="text-3xl sm:text-4xl font-bold tracking-tight leading-tight">
            OpenADAS
          </h1>

          <div class="space-y-1">
            <div class="text-5xl sm:text-6xl font-black tracking-tight leading-none">
              <span id="km-counter">2170</span><span class="text-emerald-300">km</span>
            </div>
            <p class="text-base sm:text-lg text-zinc-200 leading-snug">
              đã đồng hành an toàn cùng tài xế
            </p>
          </div>

          <p class="text-base sm:text-lg text-zinc-200 leading-relaxed">
            Biến xe bạn thành <span class="text-white font-semibold">xe thông minh</span> với 1 ứng dụng.
          </p>
        </div>

        <div class="grid grid-cols-2 gap-2 text-center text-xs sm:text-sm">
          <div class="rounded-2xl bg-white/5 px-3 py-3 border border-white/10">
            Cảnh báo điểm mù
          </div>
          <div class="rounded-2xl bg-white/5 px-3 py-3 border border-white/10">
            Nhận diện biển báo
          </div>
          <div class="rounded-2xl bg-white/5 px-3 py-3 border border-white/10">
            Cảnh báo mở cửa
          </div>
          <div class="rounded-2xl bg-white/5 px-3 py-3 border border-dashed border-white/20 text-zinc-400">
            ... và còn nữa
          </div>

        <div class="flex flex-col sm:flex-row gap-3">
          <a href="https://github.com/drivesafer/openADAS" target="_blank" rel="noopener noreferrer" class="flex-1 rounded-2xl border border-white/15 bg-white/5 px-4 py-3 text-sm font-semibold text-center hover:bg-white/10 transition flex items-center justify-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">

            </svg>
            Đóng góp vào Open-source
          </a>
          <a href="https://openadas.io.vn" class="flex-1 rounded-2xl bg-white text-zinc-950 px-4 py-3 text-sm font-semibold text-center hover:opacity-90 transition">

          </a>
        </div>

        <div class="pt-2 border-t border-white/10 text-sm text-zinc-400">
          Founder: <a href="mailto:ivan@openadas.io.vn" class="text-white hover:underline">ivan@openadas.io.vn</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    const counter = document.getElementById('km-counter');
    let current = 7100;
    const target = 7132;
    const step = () => {
      if (current < target) {
        current += 1;
        counter.textContent = current;
        setTimeout(step, 140);
      }
    };
    window.addEventListener('load', () => {
      setTimeout(step, 250);
    });
  </script>
</body>
