<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <title>OpenADAS demo</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      /*
        Quan trọng:
        Không ép video/canvas width:100vw height:100vh object-fit:cover.
        Nếu ép, mobile sẽ bị lệch hệ tọa độ giữa camera feed và tracking.
      */

      a-scene {
        position: fixed !important;
        inset: 0 !important;
        width: 100% !important;
        height: 100% !important;
        background: transparent !important;
      }

      canvas,
      .a-canvas {
        background: transparent !important;
      }

      #ui {
        position: fixed;
        inset: 0;
        z-index: 9999;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: max(20px, env(safe-area-inset-top)) 20px
          max(20px, env(safe-area-inset-bottom));
        box-sizing: border-box;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .brand {
        color: white;
        font-size: 18px;
        font-weight: 850;
        letter-spacing: -0.2px;
        text-shadow: 0 2px 14px rgba(0, 0, 0, 0.9);
      }

      .status {
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.62);
        color: white;
        font-size: 14px;
        font-weight: 750;
        white-space: nowrap;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.32);
      }

      .status.detected {
        background: rgba(0, 126, 76, 0.92);
      }

      .center-message {
        align-self: center;
        max-width: 720px;
        width: calc(100vw - 40px);
        padding: 20px 20px;
        border-radius: 24px;
        background: rgba(0, 0, 0, 0.62);
        color: white;
        text-align: center;
        backdrop-filter: blur(14px);
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.42);
      }

      .center-message.hidden {
        display: none;
      }

      .vi {
        font-size: clamp(19px, 4.8vw, 32px);
        line-height: 1.25;
        font-weight: 850;
        margin-bottom: 10px;
      }

      .en {
        font-size: clamp(14px, 3.2vw, 20px);
        line-height: 1.35;
        font-weight: 550;
        opacity: 0.9;
      }

      .bottom-hint {
        color: rgba(255, 255, 255, 0.88);
        text-align: center;
        font-size: 13px;
        line-height: 1.4;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.9);
      }

      #error {
        display: none;
        position: fixed;
        left: 16px;
        right: 16px;
        bottom: max(16px, env(safe-area-inset-bottom));
        z-index: 10000;
        padding: 14px 16px;
        border-radius: 16px;
        color: white;
        background: rgba(170, 0, 0, 0.92);
        font-size: 13px;
        line-height: 1.45;
      }

      #error.show {
        display: block;
      }

      .mindar-ui-overlay,
      .mindar-ui-loading,
      .mindar-ui-scanning,
      .mindar-ui-compatibility {
        display: none !important;
      }
    </style>

    <script>
      const OVERLAY_CONFIG = {
        x: 0,
        y: 0,
        z: 0.02,
        scale: 1.0,
      };

      AFRAME.registerComponent("transparent-renderer", {
        init: function () {
          const scene = this.el;

          const apply = () => {
            if (!scene.renderer) return;

            scene.renderer.setClearColor(0x000000, 0);
            scene.renderer.setClearAlpha(0);

            if (scene.canvas) {
              scene.canvas.style.background = "transparent";
            }
          };

          scene.addEventListener("renderstart", apply);
          setTimeout(apply, 100);
          setTimeout(apply, 500);
          setTimeout(apply, 1000);
        },
      });

      AFRAME.registerComponent("fit-overlay-to-target", {
        schema: {
          targetImage: { type: "selector" },
        },

        init: function () {
          const overlay = this.el;
          const targetImage = this.data.targetImage;

          const applySize = () => {
            const w = targetImage.naturalWidth;
            const h = targetImage.naturalHeight;

            if (!w || !h) {
              console.warn("Cannot read src/image.png size.");
              return;
            }

            overlay.setAttribute("width", 1);
            overlay.setAttribute("height", h / w);

            overlay.setAttribute(
              "position",
              `${OVERLAY_CONFIG.x} ${OVERLAY_CONFIG.y} ${OVERLAY_CONFIG.z}`
            );

            overlay.setAttribute(
              "scale",
              `${OVERLAY_CONFIG.scale} ${OVERLAY_CONFIG.scale} ${OVERLAY_CONFIG.scale}`
            );
          };

          if (targetImage.complete) {
            applySize();
          } else {
            targetImage.addEventListener("load", applySize, { once: true });
          }
        },
      });

      window.addEventListener("DOMContentLoaded", () => {
        const scene = document.querySelector("a-scene");
        const target = document.querySelector("#standeeTarget");
        const message = document.querySelector("#message");
        const status = document.querySelector("#status");
        const errorBox = document.querySelector("#error");

        const showError = (text) => {
          errorBox.textContent = text;
          errorBox.classList.add("show");
        };

        const setSearching = () => {
          status.textContent = "Đang quét tình huống / Scanning";
          status.classList.remove("detected");
          message.classList.remove("hidden");
        };

        const setDetected = () => {
          status.textContent = "Đã phát hiện / Detected";
          status.classList.add("detected");
          message.classList.add("hidden");
        };

        setSearching();

        scene.addEventListener("arReady", () => {
          status.textContent = "Camera đã sẵn sàng / Camera ready";

          if (scene.renderer) {
            scene.renderer.setClearColor(0x000000, 0);
            scene.renderer.setClearAlpha(0);
          }
        });

        scene.addEventListener("arError", () => {
          showError(
            "Không mở được camera. Hãy chạy bằng HTTPS hoặc localhost, kiểm tra quyền camera và reload trang."
          );
        });

        target.addEventListener("targetFound", setDetected);
        target.addEventListener("targetLost", setSearching);

        Promise.all([
          fetch("./src/image.png", { method: "HEAD" }),
          fetch("./src/ar.png", { method: "HEAD" }),
          fetch("./src/image.mind", { method: "HEAD" }),
        ]).catch(() => {
          showError(
            "Thiếu file trong thư mục src. Cần có src/image.png, src/ar.png và src/image.mind."
          );
        });
      });
    </script>
  </head>

  <body>
    <a-scene
      transparent-renderer
      mindar-image="imageTargetSrc: ./src/image.mind; autoStart: true; filterMinCF: 0.0001; filterBeta: 10; warmupTolerance: 2; missTolerance: 5"
      renderer="alpha: true; antialias: true; colorManagement: true; physicallyCorrectLights: true"
      color-space="sRGB"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      loading-screen="enabled: false"
    >
      <a-assets timeout="10000">
        <img id="targetImage" src="./src/image.png" />
        <img id="overlayImage" src="./src/ar.png" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="standeeTarget" mindar-image-target="targetIndex: 0">
        <a-image
          id="overlayPlane"
          src="#overlayImage"
          rotation="0 0 0"
          fit-overlay-to-target="targetImage: #targetImage"
          material="transparent: true; opacity: 1; alphaTest: 0.01; side: double"
        ></a-image>
      </a-entity>
    </a-scene>

    <div id="ui">
      <div class="topbar">
        <div class="brand">OpenADAS demo</div>
        <div id="status" class="status">Đang mở camera / Starting camera</div>
      </div>

      <div id="message" class="center-message">
        <div class="vi">
          Hãy đưa camera vào standee để phát hiện những tình huống bất thường
        </div>
        <div class="en">
          Point the camera at the standee to detect abnormal situations.
        </div>
      </div>

      <div class="bottom-hint">
        Giữ standee rõ nét trong khung hình · Keep the standee clearly visible
      </div>
    </div>

    <div id="error"></div>
  </body>
</html>
